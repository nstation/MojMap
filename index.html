<!doctype html>
<html lang="ja">
<head>
    <title>法務省地図XML（PMTiles）</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" crossorigin="anonymous">
    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/pmtiles@2.7.0/dist/index.js"></script>
    <script src="https://unpkg.com/@maplibre/maplibre-gl-geocoder@1.2.0/dist/maplibre-gl-geocoder.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@maplibre/maplibre-gl-geocoder@1.2.0/dist/maplibre-gl-geocoder.css"
        type="text/css" />
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .map-overlay {
            font: bold 12px/20px 'Helvetica Neue', Arial, Helvetica, sans-serif;
            position: absolute;
            width: 240px;
            bottom: 30px;
            left: 0;
            padding: 10px;
        }

        .map-overlay .map-overlay-inner {
            background-color: #fff;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            border-radius: 3px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .map-overlay label {
            display: block;
            margin: 0;
        }

        .map-overlay input {
            background-color: transparent;
            display: inline-block;
            width: 100%;
            position: relative;
            margin: 0;
            cursor: ew-resize;
        }

        .maplibregl-popup .maplibregl-popup-content {
            padding: 8px 10px;
            font: 12px/14px Arial, Helvetica, sans-serif;
            color: black;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
            border-radius: 5px;
            width: 240px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="map-overlay top">
        <div class="map-overlay-inner">
            <label>空中写真 撮影時期: <span id="slider-year-value">全国最新写真</span></label>
            <input id="slider-year" type="range" min="0" max="8" step="1" value="8">
            <label>空中写真 不透明度: <span id="slider-opacity-value">100%</span></label>
            <input id="slider-opacity" type="range" min="0" max="100" step="1" value="100">
        </div>
    </div>
    <script type="text/javascript">
        // =====================================================================
        // 定数
        // =====================================================================
        const PMTILES_URL = 'https://habs.rad.naro.go.jp/spatial_data/amx/a.pmtiles';
        const INITIAL_CENTER = [132.754721, 35.367103];
        const INITIAL_ZOOM = 15;

        /** 国土地理院 空中写真ラスタレイヤ定義 */
        const RASTER_LAYERS = [
            {
                id: 'ort_1928',
                tiles: ['https://cyberjapandata.gsi.go.jp/xyz/ort_1928/{z}/{x}/{y}.png'],
                attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html#ort_1928">空中写真（1928年頃）</a>',
                label: '1928年頃(大阪市)'
            },
            {
                id: 'ort_riku10',
                tiles: ['https://cyberjapandata.gsi.go.jp/xyz/ort_riku10/{z}/{x}/{y}.png'],
                attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html#ort_riku10">空中写真（1936年～1942年頃）</a>',
                label: '1936年～1942年頃(東京23区内・大阪市)'
            },
            {
                id: 'ort_USA10',
                tiles: ['https://cyberjapandata.gsi.go.jp/xyz/ort_USA10/{z}/{x}/{y}.png'],
                attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html#ort_USA10">空中写真（1945年～1950年頃）</a>',
                label: '1945年～1950年頃'
            },
            {
                id: 'ort_old10',
                tiles: ['https://cyberjapandata.gsi.go.jp/xyz/ort_old10/{z}/{x}/{y}.png'],
                attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html#ort_old10">空中写真（1961年～1969年頃）</a>',
                label: '1961年～1969年頃'
            },
            {
                id: 'gazo1',
                tiles: ['https://cyberjapandata.gsi.go.jp/xyz/gazo1/{z}/{x}/{y}.jpg'],
                attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html#gazo1">空中写真（1974年～1978年頃）</a>',
                label: '1974年～1978年頃'
            },
            {
                id: 'gazo2',
                tiles: ['https://cyberjapandata.gsi.go.jp/xyz/gazo2/{z}/{x}/{y}.jpg'],
                attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html#gazo2">空中写真（1979年～1983年頃）</a>',
                label: '1979年～1983年頃'
            },
            {
                id: 'gazo3',
                tiles: ['https://cyberjapandata.gsi.go.jp/xyz/gazo3/{z}/{x}/{y}.jpg'],
                attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html#gazo3">空中写真（1984年～1986年頃）</a>',
                label: '1984年～1986年頃'
            },
            {
                id: 'gazo4',
                tiles: ['https://cyberjapandata.gsi.go.jp/xyz/gazo4/{z}/{x}/{y}.jpg'],
                attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html#gazo4">空中写真（1987年～1990年頃）</a>',
                label: '1987年～1990年頃'
            },
            {
                id: 'seamlessphoto',
                tiles: ['https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg'],
                attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html#seamlessphoto">全国最新写真（シームレス）</a>',
                label: '全国最新写真'
            }
        ];

        const DEFAULT_LAYER_INDEX = RASTER_LAYERS.length - 1;

        // =====================================================================
        // PMTiles プロトコル登録
        // =====================================================================
        const protocol = new pmtiles.Protocol();
        maplibregl.addProtocol('pmtiles', protocol.tile);

        const pmtilesInstance = new pmtiles.PMTiles(PMTILES_URL);
        protocol.add(pmtilesInstance);

        // =====================================================================
        // URL ハッシュからマーカー座標を取得
        // =====================================================================
        function parseMarkerFromHash() {
            const [, lat, lng] = location.hash.split('/');
            if (lat === undefined || lng === undefined) return null;
            return { lat: Number(lat), lng: Number(lng) };
        }

        const marker = parseMarkerFromHash();

        // =====================================================================
        // マップ初期化
        // =====================================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: './std.json',
            hash: true,
            zoom: INITIAL_ZOOM,
            maxZoom: 23,
            minZoom: 4,
            center: INITIAL_CENTER,
            attributionControl: false
        });

        // --- コントロール追加 ---
        map.addControl(new maplibregl.NavigationControl());
        map.addControl(new maplibregl.FullscreenControl());
        map.addControl(new maplibregl.GeolocateControl({
            positionOptions: { enableHighAccuracy: false },
            fitBoundsOptions: { maxZoom: 18 },
            trackUserLocation: true,
            showUserLocation: true
        }));
        map.addControl(new maplibregl.ScaleControl({
            maxWidth: 200,
            unit: 'metric'
        }));
        map.addControl(new maplibregl.AttributionControl({
            compact: true,
            customAttribution:
                '（<a href="https://twitter.com/shi__works" target="_blank">Twitter</a>'
                + ' | <a href="https://github.com/shi-works/MojMap" target="_blank">Github</a>） '
        }));

        // --- ジオコーダー ---
        const geocoderApi = {
            forwardGeocode: async (config) => {
                const features = [];
                try {
                    const url =
                        'https://nominatim.openstreetmap.org/search?q='
                        + config.query
                        + '&format=geojson&polygon_geojson=1&addressdetails=1';
                    const response = await fetch(url);
                    const geojson = await response.json();

                    for (const feature of geojson.features) {
                        const center = [
                            feature.bbox[0] + (feature.bbox[2] - feature.bbox[0]) / 2,
                            feature.bbox[1] + (feature.bbox[3] - feature.bbox[1]) / 2
                        ];
                        features.push({
                            type: 'Feature',
                            geometry: { type: 'Point', coordinates: center },
                            place_name: feature.properties.display_name,
                            properties: feature.properties,
                            text: feature.properties.display_name,
                            place_type: ['place'],
                            center
                        });
                    }
                } catch (e) {
                    console.error(`Failed to forwardGeocode with error: ${e}`);
                }
                return { features };
            }
        };

        map.addControl(
            new MaplibreGeocoder(geocoderApi, { maplibregl }),
            'top-left'
        );

        // =====================================================================
        // スライダー制御
        // =====================================================================
        const sliderYear = document.getElementById('slider-year');
        const sliderYearValue = document.getElementById('slider-year-value');
        const sliderOpacity = document.getElementById('slider-opacity');
        const sliderOpacityValue = document.getElementById('slider-opacity-value');

        /** 指定 index のラスタレイヤのみ表示する */
        function applyRasterVisibility(activeIndex) {
            RASTER_LAYERS.forEach((layer, index) => {
                map.setLayoutProperty(layer.id, 'visibility', index === activeIndex ? 'visible' : 'none');
            });
            sliderYearValue.textContent = RASTER_LAYERS[activeIndex]?.label ?? '';
        }

        /** 全ラスタレイヤの不透明度を設定する */
        function applyRasterOpacity(opacityValue) {
            const opacity = opacityValue / 100;
            RASTER_LAYERS.forEach((layer) => {
                map.setPaintProperty(layer.id, 'raster-opacity', opacity);
            });
            sliderOpacityValue.textContent = `${opacityValue}%`;
        }

        // =====================================================================
        // レイヤ追加 & イベントハンドラ（map load）
        // =====================================================================
        map.on('load', () => {
            // --- 空中写真ラスタレイヤ ---
            RASTER_LAYERS.forEach((layer) => {
                map.addSource(layer.id, {
                    type: 'raster',
                    tiles: layer.tiles,
                    tileSize: 256,
                    attribution: layer.attribution
                });
                map.addLayer({
                    id: layer.id,
                    type: 'raster',
                    source: layer.id,
                    minzoom: 14,
                    maxzoom: 23
                });
            });

            applyRasterVisibility(DEFAULT_LAYER_INDEX);

            sliderYear.addEventListener('input', (e) => {
                applyRasterVisibility(Number(e.target.value));
            });
            sliderOpacity.addEventListener('input', (e) => {
                applyRasterOpacity(Number(e.target.value));
            });

            // --- 法務省地図XML ベクトルタイル ---
            map.addSource('pmtiles', {
                type: 'vector',
                url: 'pmtiles://' + PMTILES_URL,
                attribution: '<a href="https://github.com/amx-project">法務省地図XMLアダプトプロジェクト ベクトルタイル</a>'
            });

            // 代表点レイヤ（外側 glow）
            map.addLayer({
                id: 'daihyo-1',
                source: 'pmtiles',
                'source-layer': 'daihyo',
                type: 'circle',
                paint: {
                    'circle-color': 'rgba(0, 203, 0, 0.6)',
                    'circle-blur': 0.8,
                    'circle-radius': 4
                }
            });

            // 代表点レイヤ（内側）
            map.addLayer({
                id: 'daihyo-2',
                source: 'pmtiles',
                'source-layer': 'daihyo',
                type: 'circle',
                paint: {
                    'circle-color': 'rgba(204, 255, 204, 1)',
                    'circle-radius': 2
                }
            });

            // 筆レイヤ（ポリゴン）
            map.addLayer({
                id: 'fude-polygon',
                source: 'pmtiles',
                'source-layer': 'fude',
                type: 'fill',
                paint: {
                    'fill-color': '#FFF2CC',
                    'fill-opacity': [
                        'case',
                        ['boolean', ['feature-state', 'hover'], false],
                        1,
                        0.2
                    ]
                }
            });

            // 筆レイヤ（ライン）
            map.addLayer({
                id: 'fude-line',
                source: 'pmtiles',
                'source-layer': 'fude',
                type: 'line',
                paint: {
                    'line-color': '#FF3232',
                    'line-width': 1
                }
            });

            // --- ハッシュ指定マーカー ---
            if (marker) {
                map.addSource('source_point', {
                    type: 'geojson',
                    data: {
                        type: 'Feature',
                        geometry: {
                            type: 'Point',
                            coordinates: [marker.lng, marker.lat]
                        }
                    }
                });
                map.addLayer({
                    id: 'source_point',
                    type: 'circle',
                    source: 'source_point',
                    paint: {
                        'circle-color': '#0000ff',
                        'circle-radius': 10
                    }
                });
            }

            // --- ポップアップ表示 ---
            map.on('click', 'fude-polygon', (e) => {
                const { lng, lat } = e.lngLat;
                const props = e.features[0].properties;

                const address = [
                    props['市区町村名'] ?? '',
                    props['大字名'] ?? '',
                    props['丁目名'] ?? '',
                    props['小字名'] ?? '',
                    props['地番'] ?? '-'
                ].join('');

                const html = `
                    <b>${address}</b><br /><br />
                    座標系: ${props['座標系'] ?? '-'}<br>
                    地図名: ${props['地図名'] ?? '-'}<br>
                    縮尺分母: ${props['縮尺分母'] ?? '-'}<br>
                    地番: ${props['地番'] ?? '-'}<br>
                    座標: ${lat.toFixed(7)},${lng.toFixed(7)}<br /><br />
                    <a href="https://map.yahoo.co.jp/place?lat=${lat}&lon=${lng}" target="_blank">🌎Yahoo!マップ</a><br />
                    <a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank">🌎Google Maps</a>
                `;

                new maplibregl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(html)
                    .addTo(map);
            });

            map.on('mouseenter', 'fude-polygon', () => {
                map.getCanvas().style.cursor = 'pointer';
            });
            map.on('mouseleave', 'fude-polygon', () => {
                map.getCanvas().style.cursor = '';
            });
        });
    </script>
</body>
</html>
